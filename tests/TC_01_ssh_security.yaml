# TC_01_ssh_security: SSH Security Configuration Audit
# Validates SSH daemon hardening settings against CIS benchmark recommendations.
# Steps 1.2, 1.3, 1.5 commonly FAIL on default cloud VM installs.

name: SSH Security Configuration Audit
description: Validates SSH hardening — PasswordAuthentication, PermitRootLogin, MaxAuthTries
tags:
- security
- ssh
- compliance
steps:
- name: 1.1 SSH daemon is active
  command: bash
  responses:
  - '{ systemctl is-active ssh 2>/dev/null || systemctl is-active sshd 2>/dev/null; } | grep -xq active && echo SVC_UP || echo SVC_DOWN'
  - exit
  wait: 5
  criteria:
    expected_output: SVC_UP

- name: 1.2 PasswordAuthentication is disabled
  command: bash
  responses:
  - grep -cE "^PasswordAuthentication\s+no" /etc/ssh/sshd_config 2>/dev/null
  - exit
  wait: 5
  criteria:
    expected_output: "1"

- name: 1.3 PermitRootLogin is disabled or prohibit-password
  command: bash
  responses:
  - grep -cE "^PermitRootLogin\s+(no|prohibit-password)" /etc/ssh/sshd_config 2>/dev/null
  - exit
  wait: 5
  criteria:
    expected_output: "1"

- name: 1.4 SSH is listening on expected port
  command: bash
  responses:
  - ss -tlnp 2>/dev/null | grep -E ':22\s' | awk '{print $4}'
  - exit
  wait: 5
  criteria:
    expected_output: "22"

- name: 1.5 MaxAuthTries set to 3 or fewer
  command: bash
  responses:
  - grep -cE "^MaxAuthTries\s+[123]$" /etc/ssh/sshd_config 2>/dev/null
  - exit
  wait: 5
  criteria:
    expected_output: "1"

expected_result: SSH daemon running; PasswordAuth disabled; root login restricted; MaxAuthTries <= 3
